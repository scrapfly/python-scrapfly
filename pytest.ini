[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Exclude source code directories from test collection
norecursedirs = .git .tox dist build *.egg venv scrapfly examples

markers =
    unit: Unit tests that don't require API calls
    integration: Integration tests that require API access
    slow: Tests that take a long time to run
    artifacts: Tests for WARC/HAR artifact parsing
    async: Tests for async functionality
    config: Tests for configuration objects
    workflow: Tests for complete workflows
    errors: Tests for error handling
